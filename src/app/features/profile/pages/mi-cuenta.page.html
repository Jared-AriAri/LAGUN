<div class="min-h-screen pt-32 pb-16 px-4 sm:px-6 relative flex justify-center">
    <div
        class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_top,rgba(0,229,255,0.05),transparent_40%),radial-gradient(circle_at_bottom,rgba(255,44,223,0.05),transparent_40%)]">
    </div>

    <div class="w-full max-w-2xl relative">
        <div
            class="bg-[#110D1A]/80 backdrop-blur-xl border border-white/10 rounded-3xl shadow-[0_0_40px_rgba(0,229,255,0.05)] overflow-hidden">

            <div
                class="relative h-32 bg-gradient-to-r from-cyan-500/20 via-violet-500/20 to-fuchsia-500/20 border-b border-white/10">
                <div class="absolute -bottom-12 left-8">
                    <div
                        class="w-24 h-24 rounded-full border-4 border-[#110D1A] bg-[#1A1525] shadow-[0_0_20px_rgba(0,229,255,0.3)] overflow-hidden grid place-items-center relative group">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-cyan-400/30 to-fuchsia-500/30 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                        </div>
                        <img *ngIf="avatarUrl; else noAvatar" [src]="avatarUrl"
                            class="w-full h-full object-cover relative z-10" alt="Avatar">
                        <ng-template #noAvatar>
                            <span class="text-3xl font-bold text-white/80 relative z-10">{{ initial }}</span>
                        </ng-template>
                    </div>
                </div>
            </div>

            <div class="pt-16 pb-8 px-8">
                <h1 class="text-2xl font-bold text-white mb-1">Ajustes de Cuenta</h1>
                <p class="text-sm text-cyan-400 mb-8 uppercase tracking-widest">{{ role }}</p>

                <div *ngIf="successMsg"
                    class="mb-6 p-4 rounded-xl bg-green-500/10 border border-green-500/30 text-green-400 text-sm">
                    {{ successMsg }}
                </div>
                <div *ngIf="errorMsg"
                    class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
                    {{ errorMsg }}
                </div>

                <form (ngSubmit)="saveProfile()" class="space-y-6">

                    <div>
                        <label class="block text-xs font-semibold text-white/60 uppercase tracking-wider mb-2">Correo
                            Electrónico (No editable)</label>
                        <input type="email" [value]="email" disabled
                            class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3 text-sm text-white/50 cursor-not-allowed">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-white/80 uppercase tracking-wider mb-2">Nombre de
                            visualización</label>
                        <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="Ej. Master Chief"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/30 focus:outline-none focus:border-cyan-400 focus:bg-white/10 transition shadow-[inset_0_0_10px_rgba(0,0,0,0.2)]">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-white/80 uppercase tracking-wider mb-2">Foto de
                            Perfil (Avatar)</label>
                        <div class="relative border-2 border-dashed rounded-xl p-8 text-center transition-all duration-300 flex flex-col items-center justify-center gap-3 cursor-pointer overflow-hidden"
                            [ngClass]="isDragging ? 'border-fuchsia-400 bg-fuchsia-500/10 scale-[1.02]' : 'border-white/20 bg-white/5 hover:border-cyan-400 hover:bg-white/10'"
                            (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
                            (click)="fileInput.click()">
                            <input type="file" #fileInput class="hidden" accept="image/*"
                                (change)="onFileSelected($event)">

                            <ng-container *ngIf="uploadingImage">
                                <div
                                    class="animate-spin w-8 h-8 border-4 border-cyan-400 border-t-transparent rounded-full mb-2">
                                </div>
                                <p class="text-sm text-cyan-400 animate-pulse font-medium">Subiendo a los servidores...
                                </p>
                            </ng-container>

                            <ng-container *ngIf="!uploadingImage">
                                <div *ngIf="avatarUrl" class="absolute inset-0 w-full h-full opacity-20">
                                    <img [src]="avatarUrl" class="w-full h-full object-cover">
                                </div>

                                <div class="relative z-10 flex flex-col items-center gap-3">
                                    <div
                                        class="p-3 rounded-full bg-white/5 text-white/50 group-hover:text-cyan-400 transition-colors">
                                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                        </svg>
                                    </div>
                                    <p class="text-sm text-white/70">
                                        <span
                                            class="text-cyan-400 font-semibold drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">
                                            {{ avatarUrl ? 'Cambiar imagen' : 'Haz clic' }}
                                        </span> o arrastra aquí
                                    </p>
                                    <p class="text-xs text-white/40">JPG, PNG o WEBP</p>
                                </div>
                            </ng-container>
                        </div>
                    </div>

                    <div>
                        <label
                            class="block text-xs font-semibold text-white/80 uppercase tracking-wider mb-2">Biografía</label>
                        <textarea [(ngModel)]="bio" name="bio" rows="3" placeholder="Cuéntanos a qué juegas..."
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/30 focus:outline-none focus:border-fuchsia-400 focus:bg-white/10 transition shadow-[inset_0_0_10px_rgba(0,0,0,0.2)] resize-none"></textarea>
                    </div>

                    <div class="pt-4 flex justify-end">
                        <button type="submit" [disabled]="loading || uploadingImage"
                            class="group relative overflow-hidden inline-flex items-center justify-center px-8 py-3 rounded-xl font-bold text-white transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(0,229,255,0.2)] hover:shadow-[0_0_30px_rgba(255,44,223,0.3)] disabled:opacity-50 disabled:pointer-events-none">
                            <span
                                class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-violet-500 to-fuchsia-500 opacity-90 group-hover:opacity-100 transition-opacity"></span>
                            <span
                                class="absolute inset-0 bg-[linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent)] -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-in-out"></span>
                            <span class="relative tracking-widest uppercase text-xs flex items-center gap-2">
                                <span *ngIf="loading"
                                    class="animate-spin text-lg border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                                {{ loading ? 'Guardando...' : 'Guardar Cambios' }}
                            </span>
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
