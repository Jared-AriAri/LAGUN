<section class="max-w-7xl mx-auto px-6 py-16 text-white">
    <div class="flex items-end justify-between gap-6 flex-wrap mb-10">
        <div>
            <h2
                class="text-4xl font-extrabold bg-gradient-to-r from-[#00E5FF] via-[#FF2CDF] to-[#7C3AED] bg-clip-text text-transparent">
                Noticias Recientes
            </h2>
            <p class="text-white/60 mt-2">Explora las últimas novedades del mundo gamer directamente desde la base de
                datos.</p>
        </div>
        <div class="text-xs uppercase tracking-widest text-white/50"> LAGUN • Live Feed </div>
    </div>

    <div *ngIf="loading" class="flex justify-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#00E5FF]"></div>
    </div>

    <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <article *ngFor="let n of news"
            class="rounded-2xl bg-[#0A0712]/60 backdrop-blur-xl border border-white/10 overflow-hidden hover:border-cyan-400/40 transition-all duration-300 group flex flex-col h-full">

            <div class="relative aspect-video overflow-hidden">
                <img [src]="n.cover_image_url || 'assets/placeholder.jpg'" [alt]="n.title"
                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />

                <div class="absolute top-3 left-3 flex gap-2">
                    <span *ngFor="let cat of n.categories"
                        class="px-3 py-1 rounded-full text-[10px] font-bold bg-black/70 border border-cyan-400/30 text-cyan-400 uppercase tracking-tighter">
                        {{ cat.name }}
                    </span>
                </div>
            </div>

            <div class="p-5 flex flex-col flex-grow space-y-3">
                <div class="text-[10px] text-white/40 font-mono">{{ n.published_at | date:'MMM d, y' }}</div>

                <h3 class="font-bold leading-tight group-hover:text-cyan-400 transition-colors">
                    {{ n.title }}
                </h3>

                <p class="text-xs text-white/50 leading-relaxed line-clamp-3">
                    {{ n.excerpt }}
                </p>

                <div class="pt-4 mt-auto">
                    <a [routerLink]="['/news', n.slug]"
                        class="inline-flex items-center justify-center w-full px-4 py-2.5 text-xs font-bold rounded-xl text-white border border-white/10 bg-white/5 hover:bg-[#FF2CDF] hover:border-transparent transition-all shadow-lg">
                        LEER MÁS
                    </a>
                </div>
            </div>
        </article>
    </div>

    <div *ngIf="!loading && news.length === 0"
        class="text-center py-20 border border-dashed border-white/10 rounded-3xl">
        <p class="text-white/40">No hay noticias publicadas en este momento.</p>
    </div>
</section>
