<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Iniciar sesión</h2>
    <p class="auth-subtitle">Accede a tu cuenta.</p>

    <form (ngSubmit)="submit()" #f="ngForm" class="auth-form">

      <label class="auth-label">Email</label>
      <input class="auth-input" name="email" [(ngModel)]="email" type="email" required autocomplete="email"
        placeholder="tu@email.com" />

      <label class="auth-label">Contraseña</label>
      <input class="auth-input" name="password" [(ngModel)]="password" type="password" required
        autocomplete="current-password" placeholder="••••••••" />

      <button class="auth-button" type="submit" [disabled]="loading || !f.valid">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

      <p class="auth-error" *ngIf="errorMsg">
        {{ errorMsg }}
      </p>

      <p class="auth-link-text">
        ¿No tienes cuenta?
        <a routerLink="/register" class="auth-link">Crear cuenta</a>
      </p>

    </form>
  </div>
</div>
