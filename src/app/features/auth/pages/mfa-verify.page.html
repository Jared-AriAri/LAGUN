<div class="min-h-[85vh] flex items-center justify-center p-6">
    <div class="relative w-full max-w-md">
        <div
            class="absolute inset-0 bg-gradient-to-r from-fuchsia-500/10 via-violet-500/10 to-cyan-500/10 blur-[100px] rounded-full">
        </div>

        <div
            class="relative bg-[#0A0712]/85 backdrop-blur-2xl border border-white/10 p-10 rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.4)] text-center overflow-hidden">
            <div
                class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[2px] bg-gradient-to-r from-transparent via-cyan-400 to-transparent shadow-[0_0_15px_rgba(34,211,238,0.8)]">
            </div>

            <div class="relative mb-8">
                <div class="absolute inset-0 blur-2xl bg-cyan-400/20 rounded-full"></div>
                <div class="relative text-5xl">🛡️</div>
            </div>

            <h2 class="text-3xl font-bold text-white mb-2 tracking-tight">Paso de seguridad</h2>
            <p class="text-white/50 mb-10 text-xs uppercase tracking-[0.25em]">Verificación en dos pasos</p>

            <div class="space-y-6">
                <div class="relative group">
                    <input [(ngModel)]="code" maxlength="6" (keyup.enter)="verify()" autofocus
                        class="w-full bg-white/[0.03] border border-white/10 rounded-2xl p-5 text-center text-4xl text-white tracking-[0.6em] font-mono shadow-inner focus:border-fuchsia-500/50 focus:ring-1 focus:ring-fuchsia-500/30 outline-none transition-all placeholder:text-white/10"
                        placeholder="000000">
                </div>

                <button (click)="verify()" [disabled]="code.length !== 6 || loading"
                    class="group relative w-full overflow-hidden px-6 py-4 rounded-2xl font-bold text-white transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-30 disabled:grayscale disabled:hover:scale-100">
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-violet-500 to-fuchsia-500 shadow-[0_0_25px_rgba(124,58,237,0.4)] group-hover:shadow-[0_0_35px_rgba(124,58,237,0.6)]">
                    </div>
                    <span class="relative flex items-center justify-center gap-2">
                        {{ loading ? 'Validando...' : 'Confirmar identidad' }}
                        <span *ngIf="!loading" class="text-lg">→</span>
                    </span>
                </button>
            </div>

            <div *ngIf="error"
                class="mt-6 p-3 rounded-xl bg-fuchsia-500/10 border border-fuchsia-500/20 text-fuchsia-400 text-sm animate-pulse">
                {{ error }}
            </div>

            <div class="mt-10 pt-6 border-t border-white/5">
                <button routerLink="/login"
                    class="text-xs font-semibold text-white/30 uppercase tracking-widest hover:text-white/70 transition-colors">
                    Cerrar sesión e intentar de nuevo
                </button>
            </div>
        </div>
    </div>
</div>
