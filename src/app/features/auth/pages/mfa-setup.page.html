<div class="min-h-[80vh] flex items-center justify-center p-6">
    <div class="relative w-full max-w-md">
        <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-fuchsia-500/10 blur-3xl rounded-full"></div>

        <div
            class="relative bg-[#0A0712]/80 backdrop-blur-2xl border border-white/10 p-8 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.5)] text-center">
            <h2 class="text-3xl font-bold text-white mb-2 tracking-tight">Seguridad</h2>
            <p class="text-white/50 mb-8 text-sm uppercase tracking-[0.15em]">Protege tu acceso con MFA</p>

            <div *ngIf="!qrCode">
                <button (click)="startEnroll()" [disabled]="loading"
                    class="group relative w-full overflow-hidden px-6 py-4 rounded-2xl font-bold text-white transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50">
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-violet-500 to-fuchsia-500 group-hover:opacity-90">
                    </div>
                    <span class="relative">{{ loading ? 'Generando...' : 'Configurar Autenticador' }}</span>
                </button>
            </div>

            <div *ngIf="qrCode" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                <p class="mb-6 text-sm text-white/70 italic">Escanea este código con Google Authenticator o Authy</p>

                <div
                    class="relative inline-block p-4 bg-white rounded-2xl mb-8 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    <img [src]="qrCode" class="w-48 h-48" alt="QR Code" />
                </div>

                <div class="space-y-4">
                    <input [(ngModel)]="verifyCode" maxlength="6"
                        class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-center text-3xl text-white tracking-[0.5em] font-mono focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition-all"
                        placeholder="000000">

                    <button (click)="confirmEnroll()" [disabled]="verifyCode.length !== 6 || loading"
                        class="w-full py-4 rounded-2xl font-bold text-black bg-cyan-400 hover:bg-cyan-300 shadow-[0_0_20px_rgba(34,211,238,0.4)] transition-all disabled:opacity-30 disabled:grayscale">
                        {{ loading ? 'Verificando...' : 'Activar ahora' }}
                    </button>
                </div>
            </div>

            <div *ngIf="error"
                class="mt-6 p-3 rounded-xl bg-fuchsia-500/10 border border-fuchsia-500/20 text-fuchsia-400 text-sm">
                {{ error }}
            </div>
        </div>
    </div>
</div>
