<div class="max-w-md mx-auto p-8 bg-white rounded-2xl shadow-sm border mt-10 text-center">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Seguridad de la cuenta</h2>
    <p class="text-gray-500 mb-6">Protege tu acceso con un segundo factor de autenticación.</p>

    <div *ngIf="!qrCode">
        <button (click)="startEnroll()" [disabled]="loading"
            class="w-full py-3 bg-black text-white rounded-xl font-semibold hover:bg-gray-800 transition-all disabled:opacity-50">
            {{ loading ? 'Generando...' : 'Configurar Autenticador' }}
        </button>
    </div>

    <div *ngIf="qrCode" class="animate-in fade-in duration-500">
        <p class="mb-4 text-sm text-gray-600">Escanea el código con Google Authenticator o Authy:</p>
        <div class="flex justify-center mb-6">
            <img [src]="qrCode" class="w-52 h-52 p-2 border-2 border-dashed border-gray-200 rounded-lg" />
        </div>

        <input [(ngModel)]="verifyCode" maxlength="6"
            class="w-full p-4 border rounded-xl mb-4 text-center text-3xl tracking-[0.3em] font-mono focus:border-blue-500 outline-none"
            placeholder="000000">

        <button (click)="confirmEnroll()" [disabled]="verifyCode.length !== 6 || loading"
            class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all disabled:opacity-50">
            {{ loading ? 'Verificando...' : 'Activar MFA' }}
        </button>
    </div>

    <p *ngIf="error" class="mt-4 text-red-500 text-sm font-medium">{{ error }}</p>
</div>
