<div class="min-h-[85vh] flex items-center justify-center p-6">
    <div class="relative w-full max-w-md">
        <div
            class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 via-fuchsia-500/10 to-transparent blur-[120px] rounded-full">
        </div>

        <div
            class="relative bg-[#0A0712]/85 backdrop-blur-2xl border border-white/10 p-10 rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] text-center overflow-hidden">
            <div
                class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-fuchsia-500 to-transparent shadow-[0_0_15px_rgba(255,44,223,0.8)]">
            </div>

            <div class="relative mb-8 inline-block">
                <div class="absolute inset-0 blur-2xl bg-fuchsia-500/20 rounded-full"></div>
                <div class="relative text-6xl animate-bounce-slow">📧</div>
            </div>

            <h1 class="text-3xl font-bold text-white mb-3 tracking-tight">Verifica tu correo</h1>
            <p class="text-white/50 mb-8 text-sm leading-relaxed">
                Hemos enviado un enlace de confirmación a:<br>
                <span class="text-cyan-400 font-medium tracking-wide">{{ email }}</span>
            </p>

            <div *ngIf="message"
                class="mb-6 p-4 rounded-xl bg-cyan-500/10 border border-cyan-500/20 text-cyan-300 text-sm animate-in fade-in zoom-in duration-300">
                {{ message }}
            </div>

            <div *ngIf="error"
                class="mb-6 p-4 rounded-xl bg-fuchsia-500/10 border border-fuchsia-500/20 text-fuchsia-400 text-sm animate-pulse">
                {{ error }}
            </div>

            <div class="space-y-4">
                <button (click)="resend()" [disabled]="loading"
                    class="group relative w-full overflow-hidden px-6 py-4 rounded-2xl font-bold text-white transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-30 disabled:grayscale">
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-violet-500 to-fuchsia-500 group-hover:opacity-90 transition-opacity">
                    </div>
                    <span class="relative flex items-center justify-center gap-2">
                        {{ loading ? 'Enviando...' : 'Reenviar enlace' }}
                        <span *ngIf="!loading" class="text-lg">↻</span>
                    </span>
                </button>

                <button routerLink="/login"
                    class="w-full py-4 rounded-2xl font-semibold text-white/70 border border-white/10 bg-white/5 hover:bg-white/10 hover:text-white transition-all">
                    Volver al Login
                </button>
            </div>

            <div class="mt-10 pt-6 border-t border-white/5">
                <p class="text-[10px] uppercase tracking-[0.3em] text-white/20">Lagun Security System</p>
            </div>
        </div>
    </div>
</div>
