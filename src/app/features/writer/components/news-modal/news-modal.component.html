<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" (click)="closeModal($event)"></div>

    <div (click)="$event.stopPropagation()"
        class="relative w-full max-w-2xl bg-[#0D0A14] border border-white/10 rounded-[2.5rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
        <button type="button" (click)="closeModal($event)"
            class="absolute top-6 right-6 z-[70] w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-white/40 hover:text-white hover:bg-white/10 transition-all border border-white/5">
            <span class="text-xl">✕</span>
        </button>

        <div class="p-8 border-b border-white/5 bg-white/[0.01]">
            <h3 class="text-white font-black uppercase tracking-[0.4em] text-[10px]">Editor de Noticia</h3>
        </div>

        <div class="p-8 overflow-y-auto space-y-8 custom-scrollbar">
            <div class="space-y-3">
                <p class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest ml-1">Imagen de Portada</p>

                <div class="relative group cursor-pointer w-full h-48 rounded-[2rem] border-2 border-dashed border-white/10 hover:border-cyan-500/50 transition-all flex flex-col items-center justify-center overflow-hidden bg-black/20"
                    (click)="fileInput.click()">
                    @if (formData.cover_image_url) {
                    <img [src]="formData.cover_image_url"
                        class="absolute inset-0 w-full h-full object-cover opacity-60" />

                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>

                    <div
                        class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-[10px] text-white font-bold uppercase tracking-widest">Cambiar Imagen</span>
                    </div>

                    <button type="button" (click)="removeImage($event)"
                        class="absolute bottom-4 right-4 z-10 px-4 py-2 rounded-xl bg-red-500/20 border border-red-400/30 text-red-200 text-[10px] font-bold uppercase tracking-widest hover:bg-red-500/30 transition-all">
                        Quitar Imagen
                    </button>
                    } @else {
                    <div class="flex flex-col items-center gap-2">
                        <svg class="w-8 h-8 text-white/20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path d="M12 4v16m8-8H4" stroke-width="2" />
                        </svg>
                        <span class="text-[9px] font-bold text-white/30 uppercase tracking-widest">
                            {{ uploading ? 'Subiendo...' : 'Subir Imagen' }}
                        </span>
                    </div>
                    }

                    <input #fileInput type="file" (change)="uploadImage($event)" class="hidden" accept="image/*" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2 space-y-3">
                    <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Título de la Noticia
                    </p>
                    <input type="text" [(ngModel)]="formData.title"
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:border-cyan-500/50 outline-none transition-all font-bold" />
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Categoría</p>
                    <div class="relative">
                        <select [(ngModel)]="formData.category_id"
                            class="w-full bg-[#1A1625] border border-white/10 rounded-2xl px-6 py-4 text-white/80 outline-none appearance-none cursor-pointer uppercase text-[10px] font-bold tracking-widest">
                            <option [ngValue]="null">Seleccionar Categoría</option>
                            @for (cat of categories; track cat.id) {
                            <option [ngValue]="cat.id">{{ cat.name }}</option>
                            }
                        </select>
                        <div
                            class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-white/20 text-[8px]">
                            ▼
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Estado</p>
                    <div class="relative">
                        <select [(ngModel)]="formData.status"
                            class="w-full bg-[#1A1625] border border-white/10 rounded-2xl px-6 py-4 text-white/80 outline-none appearance-none cursor-pointer uppercase text-[10px] font-bold tracking-widest">
                            <option value="draft">Borrador</option>
                            <option value="published">Publicado</option>
                            <option value="archived">Archivado</option>
                        </select>
                        <div
                            class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-white/20 text-[8px]">
                            ▼
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Extracto / Resumen</p>
                <textarea [(ngModel)]="formData.excerpt" rows="2"
                    class="w-full bg-white/5 border border-white/10 rounded-[2rem] px-6 py-4 text-white/80 outline-none resize-none custom-scrollbar"></textarea>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Contenido Principal</p>
                <textarea [(ngModel)]="formData.content" rows="6"
                    class="w-full bg-white/5 border border-white/10 rounded-[2rem] px-6 py-6 text-white/80 outline-none resize-none custom-scrollbar"></textarea>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Link de Compra</p>
                <input type="text" [(ngModel)]="formData.buy_link"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white/80 focus:border-cyan-500/50 outline-none transition-all font-bold" />
            </div>
        </div>

        <div class="p-8 bg-black/40 border-t border-white/5">
            <button type="button" (click)="onSubmit()" [disabled]="uploading || !formData.title || !formData.content"
                class="w-full py-5 rounded-2xl bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-black tracking-[0.3em] uppercase text-[10px] hover:brightness-110 active:scale-95 transition-all disabled:opacity-20">
                Guardar Noticia
            </button>
        </div>
    </div>
</div>
