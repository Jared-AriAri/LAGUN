<ng-container *ngIf="vm$ | async as vm">
  <nav class="fixed top-0 left-0 right-0 z-[1000] transition-all duration-500 ease-in-out">
    <div class="relative transition-all duration-500" [class.bg-[#0A0712]/85]="isScrolled"
      [class.backdrop-blur-2xl]="isScrolled" [class.shadow-[0_0_40px_rgba(0,229,255,0.08)]]="isScrolled"
      [class.py-0]="isScrolled" [class.py-2]="!isScrolled">

      <div *ngIf="!isScrolled"
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(0,229,255,0.10),transparent_28%),radial-gradient(circle_at_top_right,rgba(255,44,223,0.12),transparent_30%),linear-gradient(90deg,rgba(0,229,255,0.04),transparent,rgba(124,58,237,0.06))]">
      </div>

      <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
        <a routerLink="/" class="group flex items-center gap-3 select-none">
          <div class="relative">
            <div
              class="absolute inset-0 rounded-full blur-xl bg-cyan-400/30 group-hover:bg-fuchsia-500/30 transition opacity-0 group-hover:opacity-100">
            </div>
            <img src="assets/brand/logo.png" alt="LAGUN logo"
              class="relative h-12 w-auto object-contain transition-transform duration-300 hover:scale-105 drop-shadow-[0_0_18px_rgba(0,229,255,0.85)] md:h-11" />
          </div>
          <div class="hidden md:flex flex-col">
            <span class="text-[10px] tracking-[0.35em] text-white/45 font-bold uppercase">NOTICIAS • REVIEWS •
              GAMING</span>
          </div>
        </a>

        <div class="hidden md:flex items-center gap-8 text-sm uppercase tracking-[0.22em] text-white/70 font-bold">
          <a *ngFor="let l of links" [routerLink]="l.path" routerLinkActive="text-white after:w-full"
            class="relative hover:text-white transition duration-300 after:absolute after:-bottom-2 after:left-0 after:h-[2px] after:w-0 after:rounded-full after:bg-gradient-to-r after:from-cyan-400 after:via-sky-300 after:to-fuchsia-500 after:shadow-[0_0_12px_rgba(0,229,255,0.7)] after:transition-all hover:after:w-full">
            {{ l.label }}
          </a>
        </div>

        <div class="hidden md:flex items-center gap-3">
          <ng-container *ngIf="!vm.loggedIn; else loggedDesktop">
            <button (click)="goLogin()"
              class="px-5 py-2.5 rounded-full text-sm font-semibold text-white border border-cyan-400/20 bg-white/[0.03] shadow-[0_0_18px_rgba(0,229,255,0.08)] hover:border-cyan-300/40 hover:bg-cyan-400/10 transition">
              Iniciar sesión
            </button>
          </ng-container>

          <ng-template #loggedDesktop>
            <div class="relative">
              <button type="button" (click)="toggleProfileMenu($event)"
                class="relative w-11 h-11 rounded-full overflow-hidden border border-white/15 bg-white/5 grid place-items-center shadow-[0_0_18px_rgba(0,229,255,0.22)] hover:scale-105 transition">
                <div class="absolute inset-0 rounded-full bg-gradient-to-r from-cyan-400/35 to-fuchsia-500/35 blur-md">
                </div>
                <img *ngIf="vm.profile?.avatar_url" [src]="vm.profile?.avatar_url"
                  class="relative w-full h-full object-cover" />
                <span *ngIf="!vm.profile?.avatar_url" class="relative text-xs font-bold text-white/85">{{ vm.initial
                  }}</span>
              </button>

              <div *ngIf="profileMenuOpen"
                class="absolute right-0 top-14 w-68 rounded-2xl border border-cyan-400/15 bg-[#0B0813]/95 backdrop-blur-2xl shadow-2xl overflow-hidden transition-all duration-300">
                <div class="relative p-3.5 space-y-1.5">
                  <button (click)="navigate('/mi-cuenta')"
                    class="w-full text-left px-4 py-3.5 rounded-xl text-sm font-bold uppercase tracking-widest text-white/85 hover:bg-white/[0.08] transition flex items-center gap-4 group">
                    <svg class="w-5 h-5 text-cyan-400 group-hover:scale-110 transition-transform" fill="none"
                      viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Mi Cuenta
                  </button>
                  <button *ngIf="vm.canSeeWriterPanel" (click)="navigate('/writer')"
                    class="w-full text-left px-4 py-3.5 rounded-xl text-sm font-bold uppercase tracking-widest text-white/85 hover:bg-white/[0.08] transition flex items-center gap-4 group">
                    <svg class="w-5 h-5 text-violet-400 group-hover:scale-110 transition-transform" fill="none"
                      viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Escribir Contenido
                  </button>
                  <button *ngIf="vm.canSeeAdminPanel" (click)="navigate('/admin')"
                    class="w-full text-left px-4 py-3.5 rounded-xl text-sm font-bold uppercase tracking-widest text-white/85 hover:bg-white/[0.08] transition flex items-center gap-4 group">
                    <svg class="w-5 h-5 text-fuchsia-500 group-hover:scale-110 transition-transform" fill="none"
                      viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Administración
                  </button>
                  <div class="pt-2 mt-1.5 border-t border-white/10">
                    <button type="button" (click)="logout()"
                      class="w-full text-left px-4 py-3.5 rounded-xl text-sm font-bold uppercase tracking-widest text-fuchsia-300 bg-fuchsia-500/10 hover:bg-fuchsia-500/15 transition flex items-center gap-4 group">
                      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                      </svg>
                      Cerrar Sesión
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </ng-template>
        </div>

        <button type="button" (click)="toggleMobile($event)"
          class="md:hidden inline-flex items-center justify-center rounded-xl p-2 text-white/80 border border-cyan-400/15 bg-white/5 shadow-lg">
          <div *ngIf="vm.loggedIn; else notLoggedHamburger"
            class="relative w-9 h-9 rounded-full overflow-hidden grid place-items-center">
            <img *ngIf="vm.profile?.avatar_url" [src]="vm.profile?.avatar_url"
              class="relative w-full h-full object-cover" />
            <span *ngIf="!vm.profile?.avatar_url" class="relative text-xs font-bold text-white/85">{{ vm.initial
              }}</span>
          </div>
          <ng-template #notLoggedHamburger>
            <span class="text-lg font-bold">{{ isMobileOpen ? '✕' : '☰' }}</span>
          </ng-template>
        </button>
      </div>

      <div class="relative md:hidden px-4 pb-4" *ngIf="isMobileOpen">
        <div class="overflow-hidden rounded-2xl border border-cyan-400/15 bg-black/95 backdrop-blur-2xl p-3 space-y-2">
          <a *ngFor="let l of links" [routerLink]="l.path" (click)="navigate(l.path)"
            class="block px-4 py-3 rounded-xl text-sm font-bold uppercase tracking-[0.2em] text-white/75 hover:bg-white/5 transition">{{
            l.label }}</a>
          <div class="pt-3 border-t border-white/10 space-y-2">
            <ng-container *ngIf="!vm.loggedIn; else loggedMobile">
              <button (click)="goLogin()"
                class="w-full text-center px-4 py-3 rounded-xl text-sm font-bold uppercase tracking-widest border border-cyan-400/20 text-white bg-white/[0.03]">Iniciar
                sesión</button>
            </ng-container>
            <ng-template #loggedMobile>
              <button (click)="navigate('/mi-cuenta')"
                class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold uppercase tracking-widest text-white/85 hover:bg-white/5 transition">Mi
                Cuenta</button>
              <button *ngIf="vm.canSeeWriterPanel" (click)="navigate('/writer')"
                class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold uppercase tracking-widest text-white/85 hover:bg-white/5 transition">Escritor</button>
              <button *ngIf="vm.canSeeAdminPanel" (click)="navigate('/admin')"
                class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold uppercase tracking-widest text-white/85 hover:bg-white/5 transition">Admin</button>
              <button (click)="logout()"
                class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold uppercase tracking-widest text-fuchsia-300 bg-fuchsia-500/10 transition">Salir</button>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </nav>
</ng-container>
