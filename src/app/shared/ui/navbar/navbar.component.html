<nav class="fixed top-0 left-0 right-0 z-50">
  <div class="relative bg-[#0A0712]/85 backdrop-blur-2xl shadow-[0_0_40px_rgba(0,229,255,0.08)]">
    <div
      class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(0,229,255,0.10),transparent_28%),radial-gradient(circle_at_top_right,rgba(255,44,223,0.12),transparent_30%),linear-gradient(90deg,rgba(0,229,255,0.04),transparent,rgba(124,58,237,0.06))]">
    </div>

    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a routerLink="/" class="group flex items-center gap-3 select-none">
        <div class="relative">
          <div class="absolute inset-0 rounded-full blur-xl bg-cyan-400/30 group-hover:bg-fuchsia-500/30 transition">
          </div>
          <img src="assets/brand/logo.png" alt="LAGUN logo"
            class="relative h-12 w-auto object-contain transition-transform duration-300 hover:scale-105 drop-shadow-[0_0_18px_rgba(0,229,255,0.85)] md:h-11" />
        </div>

        <div class="hidden md:flex flex-col">
          <span
            class="text-sm font-bold tracking-[0.28em] bg-gradient-to-r from-cyan-300 via-white to-fuchsia-400 bg-clip-text text-transparent">
            LAGUN
          </span>
          <span class="text-[10px] tracking-[0.35em] text-white/45">
            NOTICIAS • REVIEWS • GAMING
          </span>
        </div>
      </a>

      <div class="hidden md:flex items-center gap-8 text-sm uppercase tracking-[0.22em] text-white/70">
        <a *ngFor="let l of links" [routerLink]="l.path" routerLinkActive="text-white"
          class="relative hover:text-white transition duration-300 after:absolute after:-bottom-2 after:left-0 after:h-[2px] after:w-0 after:rounded-full after:bg-gradient-to-r after:from-cyan-400 after:via-sky-300 after:to-fuchsia-500 after:shadow-[0_0_12px_rgba(0,229,255,0.7)] after:transition-all hover:after:w-full">
          {{ l.label }}
        </a>
      </div>

      <div class="hidden md:flex items-center gap-3" *ngIf="ready">
        <a routerLink="/news"
          class="relative overflow-hidden px-5 py-2.5 rounded-full text-sm font-semibold text-white border border-fuchsia-400/20 bg-gradient-to-r from-fuchsia-500 via-violet-500 to-cyan-500 shadow-[0_0_28px_rgba(255,44,223,0.35)] hover:shadow-[0_0_36px_rgba(0,229,255,0.28)] hover:scale-[1.03] active:scale-[0.99] transition">
          <span
            class="absolute inset-0 bg-[linear-gradient(120deg,transparent,rgba(255,255,255,0.18),transparent)] translate-x-[-120%] hover:translate-x-[120%] transition duration-700"></span>
          <span class="relative">Explorar</span>
        </a>

        <ng-container *ngIf="!loggedIn; else loggedDesktop">
          <button (click)="goLogin()"
            class="px-5 py-2.5 rounded-full text-sm font-semibold text-white border border-cyan-400/20 bg-white/[0.03] shadow-[0_0_18px_rgba(0,229,255,0.08)] hover:border-cyan-300/40 hover:bg-cyan-400/10 hover:shadow-[0_0_24px_rgba(0,229,255,0.18)] transition">
            Iniciar sesión
          </button>
        </ng-container>

        <ng-template #loggedDesktop>
          <div class="relative" (click)="$event.stopPropagation()">
            <button type="button" (click)="toggleProfileMenu($event)"
              class="relative w-11 h-11 rounded-full overflow-hidden border border-white/15 bg-white/5 grid place-items-center shadow-[0_0_18px_rgba(0,229,255,0.22)] hover:scale-105 transition">
              <div class="absolute inset-0 rounded-full bg-gradient-to-r from-cyan-400/35 to-fuchsia-500/35 blur-md">
              </div>
              <img *ngIf="profile?.avatar_url; else fallbackAvatar" [src]="profile?.avatar_url!"
                class="relative w-full h-full object-cover" alt="Avatar" />
              <ng-template #fallbackAvatar>
                <span class="relative text-xs font-bold text-white/85">
                  {{ initial }}
                </span>
              </ng-template>
            </button>

            <div *ngIf="profileMenuOpen"
              class="absolute right-0 top-14 w-64 rounded-2xl border border-cyan-400/15 bg-[#0B0813]/95 backdrop-blur-2xl shadow-[0_0_30px_rgba(0,229,255,0.14)] overflow-hidden">
              <div
                class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_top_right,rgba(255,44,223,0.12),transparent_35%),radial-gradient(circle_at_bottom_left,rgba(0,229,255,0.10),transparent_35%)]">
              </div>

              <div class="relative p-3 space-y-2">
                <button type="button" (click)="goToUser($event)"
                  class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                  Mi usuario
                </button>

                <button *ngIf="canSeeWriterPanel" type="button" (click)="goToWriterPanel($event)"
                  class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                  Panel de escritor
                </button>

                <button *ngIf="canSeeAdminPanel" type="button" (click)="goToAdminPanel($event)"
                  class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                  Panel de admin
                </button>

                <button *ngIf="canSeeReviewsPanel" type="button" (click)="goToReviewsPanel($event)"
                  class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                  Panel de reseñas
                </button>

                <div class="pt-2 border-t border-white/10">
                  <button type="button" (click)="logout()"
                    class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-fuchsia-500/10 hover:bg-fuchsia-500/15 transition">
                    Salir
                  </button>
                </div>
              </div>
            </div>
          </div>
        </ng-template>
      </div>

      <button type="button"
        class="md:hidden inline-flex items-center justify-center rounded-xl p-2 text-white/80 border border-cyan-400/15 bg-white/5 shadow-[0_0_18px_rgba(0,229,255,0.10)] hover:bg-white/10 hover:border-cyan-300/30 transition"
        (click)="toggleMobile()" aria-label="Abrir menú">
        <span class="text-lg">{{ mobileOpen() ? "✕" : "☰" }}</span>
      </button>
    </div>

    <div class="relative md:hidden px-4 sm:px-6 pb-4" *ngIf="mobileOpen()">
      <div
        class="overflow-hidden rounded-2xl border border-cyan-400/15 bg-black/55 backdrop-blur-2xl shadow-[0_0_28px_rgba(0,229,255,0.10)]">
        <div
          class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(255,44,223,0.12),transparent_35%),radial-gradient(circle_at_bottom_left,rgba(0,229,255,0.10),transparent_30%)] pointer-events-none">
        </div>

        <div class="relative p-3">
          <a *ngFor="let l of links" [routerLink]="l.path" routerLinkActive="text-white" (click)="closeMobile()"
            class="block px-4 py-3 rounded-xl text-sm uppercase tracking-[0.2em] text-white/75 hover:text-white hover:bg-white/5 transition">
            {{ l.label }}
          </a>

          <div class="mt-2 pt-3 border-t border-white/10 space-y-2" *ngIf="ready">
            <a routerLink="/news" (click)="closeMobile()"
              class="block text-center px-4 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-fuchsia-500 via-violet-500 to-cyan-500 shadow-[0_0_24px_rgba(255,44,223,0.28)] hover:scale-[1.01] active:scale-[0.99] transition">
              Explorar
            </a>

            <ng-container *ngIf="!loggedIn; else loggedMobile">
              <button (click)="goLogin(); closeMobile()"
                class="w-full text-center px-4 py-3 rounded-xl text-sm font-semibold border border-cyan-400/20 text-white bg-white/[0.03] hover:border-cyan-300/35 hover:bg-cyan-400/10 transition">
                Iniciar sesión
              </button>
            </ng-container>

            <ng-template #loggedMobile>
              <button (click)="goToUser(); closeMobile()"
                class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                Mi usuario
              </button>

              <button *ngIf="canSeeWriterPanel" (click)="goToWriterPanel(); closeMobile()"
                class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                Panel de escritor
              </button>

              <button *ngIf="canSeeAdminPanel" (click)="goToAdminPanel(); closeMobile()"
                class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                Panel de admin
              </button>

              <button *ngIf="canSeeReviewsPanel" (click)="goToReviewsPanel(); closeMobile()"
                class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-white/[0.03] hover:bg-white/[0.06] transition">
                Panel de reseñas
              </button>

              <button (click)="logout(); closeMobile()"
                class="w-full text-left px-4 py-3 rounded-xl text-sm text-white/85 bg-fuchsia-500/10 hover:bg-fuchsia-500/15 transition">
                Salir
              </button>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="h-[76px]"></div>
